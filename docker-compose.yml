services:
  black-racks:
    build: .
    container_name: black-racks
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      DB_PATH: /data/parlor.db
    volumes:
      - black-racks-data:/data

volumes:
  black-racks-data:
