<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Black Racks Snooker Club</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="/styles.css?v=2">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { color: #00ff88; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .login-header p { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; color: #fff; margin-bottom: 0.5rem; }
        .form-group input {
            width: 100%; padding: 0.75rem; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08); color: #fff;
        }
        .login-btn {
            width: 100%; padding: 0.75rem; border: none; border-radius: 8px;
            background: #00ff88; color: #000; font-weight: 600; cursor: pointer;
        }
        .error-message {
            display: none; color: #ff6b6b; margin-bottom: 1rem; text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Black Racks Snooker Club</h1>
                <p>Admin sign in</p>
            </div>
            <form id="loginForm">
                <div class="error-message" id="errorMessage"></div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            </form>
        </div>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
      }
      if (window.caches) {
        caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
      }
    </script>
    <script>
        class LoginManager {
            constructor() {
                this.form = document.getElementById('loginForm');
                this.errorMessage = document.getElementById('errorMessage');
                this.form.addEventListener('submit', (e) => this.handleLogin(e));
                const token = localStorage.getItem('auth_token');
                if (token) this.verifyToken(token);
            }

            async verifyToken(token) {
                try {
                    const res = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
                    if (res.ok) window.location.href = '/';
                    else localStorage.clear();
                } catch (_) {
                    localStorage.clear();
                }
            }

            async handleLogin(e) {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                this.errorMessage.style.display = 'none';
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Login failed');
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user_data', JSON.stringify(data.user));
                    localStorage.setItem('session_id', data.sessionId);
                    window.location.href = '/';
                } catch (err) {
                    this.errorMessage.textContent = err.message;
                    this.errorMessage.style.display = 'block';
                }
            }
        }
        document.addEventListener('DOMContentLoaded', () => new LoginManager());
    </script>
</body>
</html>
